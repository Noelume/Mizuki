<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="loopGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB6C1" />
      <stop offset="50%" stop-color="#FF88BB" />
      <stop offset="100%" stop-color="#FF5599" />
    </linearGradient>
    <linearGradient id="loopGradR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB6C1" />
      <stop offset="50%" stop-color="#FF88BB" />
      <stop offset="100%" stop-color="#FF5599" />
    </linearGradient>
    <linearGradient id="tailGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5599" />
      <stop offset="100%" stop-color="#D81B60" />
    </linearGradient>
    <linearGradient id="tailGradR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5599" />
      <stop offset="100%" stop-color="#D81B60" />
    </linearGradient>
    <linearGradient id="knotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB6C1" />
      <stop offset="50%" stop-color="#FF88BB" />
      <stop offset="100%" stop-color="#FF5599" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0" />
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#D81B60" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGlow)" />

  <g filter="url(#dropShadow)">
    <!-- Left Tail -->
    <path d="M 42 60 C 30 75, 15 90, 5 95 L 15 88 L 22 98 C 35 85, 45 75, 50 65 Z" fill="url(#tailGradL)" />
    <!-- Right Tail -->
    <path d="M 58 60 C 70 75, 85 90, 95 95 L 85 88 L 78 98 C 65 85, 55 75, 50 65 Z" fill="url(#tailGradR)" />

    <!-- Left Loop -->
    <path d="M 40 45 C 10 5, -15 45, 10 70 C 25 85, 40 65, 40 60 Z" fill="url(#loopGradL)" />
    <!-- Left Loop Highlight -->
    <path d="M 38 42 C 15 10, -5 40, 10 60" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <!-- Left Loop Inner Crease -->
    <path d="M 38 52 C 25 50, 15 58, 12 65" fill="none" stroke="#D81B60" stroke-width="2" stroke-linecap="round" opacity="0.4" />

    <!-- Right Loop -->
    <path d="M 60 45 C 90 5, 115 45, 90 70 C 75 85, 60 65, 60 60 Z" fill="url(#loopGradR)" />
    <!-- Right Loop Highlight -->
    <path d="M 62 42 C 85 10, 105 40, 90 60" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <!-- Right Loop Inner Crease -->
    <path d="M 62 52 C 75 50, 85 58, 88 65" fill="none" stroke="#D81B60" stroke-width="2" stroke-linecap="round" opacity="0.4" />

    <!-- Center Knot -->
    <rect x="38" y="40" width="24" height="26" rx="10" fill="url(#knotGrad)" />
    <!-- Knot Highlight -->
    <rect x="42" y="42" width="16" height="5" rx="2.5" fill="#FFFFFF" opacity="0.5" />
    <!-- Knot Shadow -->
    <ellipse cx="50" cy="62" rx="8" ry="2.5" fill="#D81B60" opacity="0.4" />
  </g>

  <!-- Sparkles -->
  <path d="M 18 18 Q 23 18, 23 13 Q 23 18, 28 18 Q 23 18, 23 23 Q 23 18, 18 18 Z" fill="#FFFFFF" opacity="0.9" />
  <path d="M 75 82 Q 80 82, 80 77 Q 80 82, 85 82 Q 80 82, 80 87 Q 80 82, 75 82 Z" fill="#FFFFFF" opacity="0.8" />
  <path d="M 82 22 Q 85 22, 85 19 Q 85 22, 88 22 Q 85 22, 85 25 Q 85 22, 82 22 Z" fill="#FFFFFF" opacity="0.7" />
</svg>