<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="100%" height="100%">
  <g transform="translate(10, 15)">
    <!-- Terminal Window Outline -->
    <rect x="0" y="0" width="96" height="70" rx="8" fill="none" stroke="currentColor" stroke-width="3"/>
    <!-- Top Bar -->
    <line x1="0" y1="22" x2="96" y2="22" stroke="currentColor" stroke-width="3"/>
    <!-- Window Controls -->
    <circle cx="15" cy="11" r="3.5" fill="currentColor"/>
    <circle cx="28" cy="11" r="3.5" fill="currentColor"/>
    <circle cx="41" cy="11" r="3.5" fill="currentColor"/>
    
    <!-- Play Button / Prompt -->
    <polygon points="14,36 14,56 30,46" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Kaomoji -->
    <text x="38" y="52" font-family="monospace" font-size="20" fill="#FF88BB" font-weight="bold">^_-</text>
    
    <!-- Blinking Cursor -->
    <rect x="78" y="38" width="8" height="16" fill="#FF88BB">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Text -->
  <text x="120" y="64" font-family="monospace" font-size="44" font-weight="bold" fill="currentColor">~/Mizuki</text>
</svg>