<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 100" width="100%" height="100%">
  <defs>
    <!-- Extracted color palette from the provided image -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <!-- Left side: Warm, light pink/peach from the hair and light bursts -->
      <stop offset="0%" stop-color="#FFB6C1" /> 
      <!-- Middle: Very soft pastel pink from the dress/light reflection -->
      <stop offset="35%" stop-color="#FFC0CB" /> 
      <!-- Right side: Light, airy blue/cyan from the background sky and structures -->
      <stop offset="70%" stop-color="#AEEEEE" /> 
      <stop offset="100%" stop-color="#87CEFA" /> 
    </linearGradient>

    <!-- Specific gradient for the kaomoji to make it pop but stay in theme -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF99B0" />
      <stop offset="100%" stop-color="#FF6B9E" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 15)">
    <!-- Terminal Window Outline -->
    <!-- Using a slightly softer color for the outline if currentColor isn't forced, but currentColor is safer for dark mode -->
    <rect x="0" y="0" width="96" height="70" rx="8" fill="none" stroke="currentColor" stroke-width="3" opacity="0.8"/>
    <!-- Top Bar -->
    <line x1="0" y1="22" x2="96" y2="22" stroke="currentColor" stroke-width="3" opacity="0.8"/>
    <!-- Window Controls -->
    <circle cx="15" cy="11" r="3.5" fill="currentColor" opacity="0.8"/>
    <circle cx="28" cy="11" r="3.5" fill="currentColor" opacity="0.8"/>
    <circle cx="41" cy="11" r="3.5" fill="currentColor" opacity="0.8"/>
    
    <!-- Play Button / Prompt -->
    <polygon points="14,36 14,56 30,46" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- Kaomoji -->
    <text x="38" y="52" font-family="monospace" font-size="20" fill="url(#pinkGrad)" font-weight="bold">^_-</text>
    
    <!-- Blinking Cursor -->
    <rect x="78" y="38" width="8" height="16" fill="#FFB6C1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Text: ~ / (Remains monospace, matching the terminal) -->
  <text x="120" y="64" font-family="monospace" font-size="44" font-weight="bold" fill="currentColor" opacity="0.8">~/</text>
  
  <!-- Text: Mizuki -->
  <!-- Horizontal alignment, using an elegant, airy serif/display font stack to match the ethereal feel of the image -->
  <!-- The font list prioritizes fonts that have varying stroke widths (like calligraphy or classic serif) which gives character without being messy -->
  <g transform="translate(175, 0)">
    <text x="0" y="64" font-family="'Playfair Display', 'Cinzel', 'Garamond', 'Didot', serif" font-size="52" font-style="italic" font-weight="600" fill="url(#bgGrad)" style="letter-spacing: 2px;">
      Mizuki
    </text>
  </g>

</svg>